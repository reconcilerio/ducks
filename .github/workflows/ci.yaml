name: CI

on:
  push:
    branches:
    - '**'
    - '!dependabot/**'
    tags:
    # semver tags
    - 'v[0-9]+\.[0-9]+\.[0-9]+-?**'
  pull_request: {}

jobs:

  tools:
    # Synthetic job to host config anchors referenced by other jobs.
    # Running this job does no meaningful work, but would pass.
    name: Build and cache tools
    runs-on: ubuntu-latest
    if: false
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache-dependency-path: '**/*.sum'
    - &install-controller-gen
      name: Install controller-gen
      uses: reconcilerio/go-install-action@v1
      with:
        package: sigs.k8s.io/controller-tools/cmd/controller-gen
        working-directory: hack/controller-gen
        output-path-env: CONTROLLER_GEN
        toolchain: auto
    - &install-diegen
      name: Install diegen
      uses: reconcilerio/go-install-action@v1
      with:
        package: reconciler.io/dies/diegen
        working-directory: hack/diegen
        output-path-env: DIEGEN
        toolchain: auto
    - &install-goimports
      name: Install goimports
      uses: reconcilerio/go-install-action@v1
      with:
        package: golang.org/x/tools/cmd/goimports
        working-directory: hack/goimports
        output-path-env: GOIMPORTS
        toolchain: auto
    - &install-imgpkg
      name: Install imgpkg
      uses: reconcilerio/go-install-action@v1
      with:
        package: carvel.dev/imgpkg/cmd/imgpkg
        working-directory: hack/imgpkg
        output-path-env: IMGPKG
        toolchain: auto
    - &install-kapp
      name: Install kapp
      uses: reconcilerio/go-install-action@v1
      with:
        package: carvel.dev/kapp/cmd/kapp
        working-directory: hack/kapp
        output-path-env: KAPP
        toolchain: auto
    - &install-kbld
      name: Install kbld
      uses: reconcilerio/go-install-action@v1
      with:
        package: carvel.dev/kbld/cmd/kbld
        working-directory: hack/kbld
        output-path-env: KBLD
        toolchain: auto
    - &install-ko
      name: Install ko
      uses: reconcilerio/go-install-action@v1
      with:
        package: github.com/google/ko
        working-directory: hack/ko
        output-path-env: KO
        toolchain: auto
    - &install-kustomize
      name: Install kustomize
      uses: reconcilerio/go-install-action@v1
      with:
        package: sigs.k8s.io/kustomize/kustomize/v5
        working-directory: hack/kustomize
        output-path-env: KUSTOMIZE
        toolchain: auto
    - &install-stern
      name: Install stern
      uses: reconcilerio/go-install-action@v1
      with:
        package: github.com/stern/stern
        working-directory: hack/stern
        output-path-env: STERN
        toolchain: auto
    - &install-yq
      name: Install yq
      uses: reconcilerio/go-install-action@v1
      with:
        package: github.com/mikefarah/yq/v4
        working-directory: hack/yq
        output-path-env: YQ
        toolchain: auto

  unit:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache-dependency-path: '**/*.sum'
    - *install-controller-gen
    - *install-diegen
    - *install-goimports
    - *install-kustomize
    - name: Test
      run: make test
    - name: Report coverage
      uses: codecov/codecov-action@v7
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    - name: Disallow generated drift
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        git diff --exit-code .

  stage:
    name: Stage
    runs-on: ubuntu-latest
    env:
      REGISTRY_NAME: registry.local
      KO_DOCKER_REPO: registry.local/ducks
      KO_PLATFORMS: linux/amd64,linux/arm64
      BUNDLE: registry.local/ducks/bundle
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache-dependency-path: '**/*.sum'
    - *install-imgpkg
    - *install-kbld
    - *install-ko
    - name: Local Registry
      uses: reconcilerio/registry@v1
      id: registry
      with:
        hostname: ${{ env.REGISTRY_NAME }}
    - name: Build all platforms for tags
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        echo "KO_PLATFORMS=all" >> $GITHUB_ENV
    - name: Build
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        scratch=$(mktemp -d -t bundle.XXXX)
        mkdir -p "${scratch}/.imgpkg"
        mkdir -p "${scratch}/config"

        cp LICENSE "${scratch}/LICENSE"

        echo "##[group]Build"
          cat hack/boilerplate.yaml.txt > "${scratch}/config/reconcilerio-ducks.yaml"
          ${KO} resolve --platform ${KO_PLATFORMS} -f config/ducks-runtime.yaml >> "${scratch}/config/reconcilerio-ducks.yaml"

          ${KBLD} --imgpkg-lock-output "${scratch}/.imgpkg/images.yml" \
            -f "${scratch}/config/reconcilerio-ducks.yaml" \
            > /dev/null
        echo "##[endgroup]"

        echo "##[group]Create bundle"
          ${IMGPKG} push -f "${scratch}" -b "${BUNDLE}"
          ${IMGPKG} copy -b "${BUNDLE}" --to-tar reconcilerio-ducks-bundle.tar
        echo "##[endgroup]"
    - uses: actions/upload-artifact@v7
      with:
        name: reconcilerio-ducks-bundle.tar
        path: reconcilerio-ducks-bundle.tar
        retention-days: 7

  acceptance:
    name: Acceptance Test
    needs: stage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - kubernetes: v1.37
        - kubernetes: v1.36
        - kubernetes: v1.35
        - kubernetes: v1.34
        - kubernetes: v1.33
    env:
      REGISTRY_NAME: registry.local
      BUNDLE: registry.local/bundle
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache-dependency-path: '**/*.sum'
    - *install-imgpkg
    - *install-kapp
    - *install-kbld
    - name: OCI registry
      uses: reconcilerio/registry@v1
      id: registry
      with:
        hostname: ${{ env.REGISTRY_NAME }}
    - name: kind cluster
      uses: reconcilerio/kind@v1
      with:
        kubernetes-version: ${{ matrix.kubernetes }}
        registry: ${{ steps.registry.outputs.registry }}
        registry-ca: ${{ steps.registry.outputs.tls-ca }}
    - name: Download staged bundle
      uses: actions/download-artifact@v8
      with:
        name: reconcilerio-ducks-bundle.tar
    - name: Relocate bundle
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        ${IMGPKG} copy --tar reconcilerio-ducks-bundle.tar --to-repo "${BUNDLE}"
        mkdir -p bundle
        ${IMGPKG} pull -b "${BUNDLE}" -o bundle
    - name: Deploy
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        echo "##[group]Create namespace"
          kubectl create ns apps
        echo "##[endgroup]"
        echo "##[group]Deploy cert-manager"
          ${KAPP} deploy -a cert-manager -n apps --wait-timeout 5m -y \
            -f https://github.com/cert-manager/cert-manager/releases/download/v1.17.1/cert-manager.yaml
        echo "##[endgroup]"
        echo "##[group]Deploy reconcilerio-ducks"
          ${KAPP} deploy -a reconcilerio-ducks -n apps --wait-timeout 5m -y \
            -f <(${KBLD} -f bundle/.imgpkg/images.yml -f bundle/config)
        echo "##[endgroup]"

    - name: Delete Gracefully
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        echo "##[group]Delete reconcilerio-ducks"
          ${KAPP} delete -a reconcilerio-ducks -n apps --wait-timeout 5m -y
        echo "##[endgroup]"
        echo "##[group]Delete cert-manager"
          ${KAPP} delete -a cert-manager -n apps --wait-timeout 5m -y
        echo "##[endgroup]"
      if: always()
    - name: Cleanup cluster
      run: kind delete cluster
      if: always()

  # aggregate the unit and acceptance results into a single job
  test:
    name: Test
    needs:
    - unit
    - acceptance
    runs-on: ubuntu-latest
    steps:
    - run: echo "it passed"

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
    - test
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache-dependency-path: '**/*.sum'
    - *install-imgpkg
    - *install-kbld
    - name: Get the version
      id: get_version
      run: echo ::set-output name=VERSION::${GITHUB_REF/refs\/tags\//}
    - name: Download staged bundle
      uses: actions/download-artifact@v8
      with:
        name: reconcilerio-ducks-bundle.tar
    - name: Install crane
      uses: reconcilerio/install-crane-action@v1
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Relocate bundle to public registry
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail

        version=${{ steps.get_version.outputs.VERSION }}

        ${IMGPKG} copy --tar reconcilerio-ducks-bundle.tar --to-repo "ghcr.io/${{ github.repository }}/bundle"
        crane tag "ghcr.io/${{ github.repository }}/bundle" "${version}"
        digest=$(crane digest "ghcr.io/${{ github.repository }}/bundle:${version}")

        scratch=$(mktemp -d -t bundle.XXXX)
        mkdir -p ${scratch}
        ${IMGPKG} pull -b "ghcr.io/${{ github.repository }}/bundle:${version}@${digest}" -o ${scratch}

        cp hack/boilerplate.yaml.txt reconcilerio-ducks.yaml
        ${KBLD} -f ${scratch}/config/reconcilerio-ducks.yaml -f ${scratch}/.imgpkg/images.yml \
          >> reconcilerio-ducks.yaml
    - name: Rename artifacts with version
      run: |
        set -o errexit
        set -o nounset
        set -o pipefail
    
        version=${{ steps.get_version.outputs.VERSION }}

        cp reconcilerio-ducks-bundle.tar reconcilerio-ducks-bundle-${version}.tar
        cp reconcilerio-ducks.yaml reconcilerio-ducks-${version}.yaml
    - name: Draft GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        draft: true
        files: |
          reconcilerio-ducks-bundle-${{ steps.get_version.outputs.VERSION }}.tar
          reconcilerio-ducks-${{ steps.get_version.outputs.VERSION }}.yaml
        fail_on_unmatched_files: true
        token: ${{ secrets.GITHUB_TOKEN }}
